</html><!DOCTYPE html>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(to right, #fff3e0, #ffe0b2);
}

/* HEADER */
.header {
    background: linear-gradient(45deg,#bf360c,#ff7043);
    color: white;
    text-align: center;
    padding: 25px;
    font-size: 32px;
    font-weight: bold;
    box-shadow: 0 3px 10px rgba(0,0,0,0.3);
}

/* FORM */
.form-box {
    background: white;
    margin: 20px auto;
    width: 90%;
    max-width: 500px;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

input {
    width: 95%;
    padding: 12px;
    margin: 8px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
}

/* TITLES */
h2 {
    text-align: center;
    color: #bf360c;
}

/* PRODUCTS */
.container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
}

.product {
    background: white;
    width: 260px;
    margin: 15px;
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    transition: 0.3s;
}

.product:hover {
    transform: scale(1.05);
}

.product img {
    width: 100%;
    height: 180px;
    object-fit: cover;
}

/* CONTENT */
.content {
    padding: 12px;
}

select, button {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
    border-radius: 8px;
    border: none;
}

button {
    background: #25D366;
    color: white;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    background: #1ebd5a;
}
</style>

</head>

<script>
function order(product,id){

var name=document.getElementById("name").value;
var phoneUser=document.getElementById("phone").value;
var address=document.getElementById("address").value;
var qty=document.getElementById(id).value;

if(name=="" || phoneUser=="" || address==""){
alert("Please fill all details");
return;
}

var msg="🛒 *NEW ORDER* %0A%0A"
+"👤 Name: "+name+"%0A"
+"📞 Phone: "+phoneUser+"%0A"
+"🏠 Address: "+address+"%0A%0A"
+"📦 Product: "+product+"%0A"
+"📏 Quantity: "+qty+"%0A%0A"
+"🔥 Swaroop's Pickles Order";

var phone="917901091495";

window.open("https://wa.me/"+phone+"?text="+msg);
}
